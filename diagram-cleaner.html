<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLAS Diagram Cleaner</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef2f6;
}
.header{
  background:#004b87;
  color:#fff;
  padding:14px;
  font-size:24px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:1000;
}
.wrap{
  padding:12px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
button,input{
  min-height:48px;
  font-size:16px;
}
button{
  border:none;
  background:#004b87;
  color:#fff;
  border-radius:10px;
  padding:12px 18px;
  font-weight:bold;
}
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.canvasWrap{
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
canvas{
  background:#fff;
  border:2px solid #ccd3df;
  border-radius:10px;
  display:block;
  touch-action:none;
}
#preview{
  width:100%;
  height:auto;
}
.status{
  font-weight:bold;
  color:#004b87;
}
</style>
</head>
<body>

<div class="header">COLAS Standalone Diagram Cleaner</div>

<div class="wrap">

<div class="card">
<input type="file" id="fileInput" accept="image/*">
<p class="status" id="status">Upload a photo of the hand-drawn diagram.</p>
</div>

<div class="card">
<h3>Crop Diagram</h3>
<div class="canvasWrap">
<canvas id="preview"></canvas>
</div>
</div>

<div class="card">
<div class="controls">
<button id="cleanBtn">Clean Diagram</button>
<button id="downloadBtn">Download PNG</button>
</div>
</div>

<div class="card">
<h3>Clean Result</h3>
<div class="canvasWrap">
<canvas id="result"></canvas>
</div>
</div>

</div>

<script>
const fileInput=document.getElementById('fileInput');
const preview=document.getElementById('preview');
const result=document.getElementById('result');
const pctx=preview.getContext('2d');
const rctx=result.getContext('2d');
const statusEl=document.getElementById('status');

let img=null;
let crop={x:80,y:80,w:300,h:420};
let dragging=false;
let mode='move';
let start={x:0,y:0};
let startCrop={};

function setStatus(t){
  statusEl.textContent=t;
}

function fitCanvas(){
  const maxW=Math.min(window.innerWidth-40,1200);
  const scale=maxW/img.width;

  preview.width=img.width*scale;
  preview.height=img.height*scale;

  crop={
    x:preview.width*0.08,
    y:preview.height*0.22,
    w:preview.width*0.84,
    h:preview.height*0.62
  };

  draw();
}

function draw(){
  if(!img)return;

  pctx.clearRect(0,0,preview.width,preview.height);
  pctx.drawImage(img,0,0,preview.width,preview.height);

  pctx.strokeStyle='#007bff';
  pctx.lineWidth=4;
  pctx.strokeRect(crop.x,crop.y,crop.w,crop.h);

  pctx.fillStyle='#007bff';

  [
    [crop.x,crop.y],
    [crop.x+crop.w,crop.y],
    [crop.x,crop.y+crop.h],
    [crop.x+crop.w,crop.y+crop.h]
  ].forEach(p=>{
    pctx.fillRect(p[0]-18,p[1]-18,36,36);
  });
}

function pos(e){
  const r=preview.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;

  return{
    x:(t.clientX-r.left)*(preview.width/r.width),
    y:(t.clientY-r.top)*(preview.height/r.height)
  };
}

function near(px,py,x,y){
  return Math.abs(px-x)<50 && Math.abs(py-y)<50;
}

preview.addEventListener('pointerdown',e=>{
  const p=pos(e);

  start=p;
  startCrop={...crop};

  if(near(p.x,p.y,crop.x,crop.y)) mode='nw';
  else if(near(p.x,p.y,crop.x+crop.w,crop.y)) mode='ne';
  else if(near(p.x,p.y,crop.x,crop.y+crop.h)) mode='sw';
  else if(near(p.x,p.y,crop.x+crop.w,crop.y+crop.h)) mode='se';
  else mode='move';

  dragging=true;
});

window.addEventListener('pointerup',()=>dragging=false);

window.addEventListener('pointermove',e=>{
  if(!dragging)return;

  const p=pos(e);
  const dx=p.x-start.x;
  const dy=p.y-start.y;

  crop={...startCrop};

  if(mode==='move'){
    crop.x+=dx;
    crop.y+=dy;
  }else{
    if(mode.includes('n')){
      crop.y+=dy;
      crop.h-=dy;
    }
    if(mode.includes('s')){
      crop.h+=dy;
    }
    if(mode.includes('w')){
      crop.x+=dx;
      crop.w-=dx;
    }
    if(mode.includes('e')){
      crop.w+=dx;
    }
  }

  crop.w=Math.max(100,crop.w);
  crop.h=Math.max(100,crop.h);

  draw();
});

fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;

  const reader=new FileReader();

  reader.onload=ev=>{
    img=new Image();

    img.onload=()=>{
      fitCanvas();
      setStatus('Adjust crop box and press Clean Diagram.');
    };

    img.src=ev.target.result;
  };

  reader.readAsDataURL(file);
});

document.getElementById('cleanBtn').addEventListener('click',()=>{
  if(!img)return;

  const sx=crop.x*(img.width/preview.width);
  const sy=crop.y*(img.height/preview.height);
  const sw=crop.w*(img.width/preview.width);
  const sh=crop.h*(img.height/preview.height);

  result.width=sw;
  result.height=sh;

  rctx.drawImage(img,sx,sy,sw,sh,0,0,sw,sh);

  const imgData=rctx.getImageData(0,0,sw,sh);
  const d=imgData.data;

  for(let i=0;i<d.length;i+=4){
    const avg=(d[i]+d[i+1]+d[i+2])/3;
    const val=avg>180?255:0;
    d[i]=val;
    d[i+1]=val;
    d[i+2]=val;
    d[i+3]=255;
  }

  rctx.putImageData(imgData,0,0);

  setStatus('Diagram cleaned. Download the PNG.');
});

document.getElementById('downloadBtn').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.href=result.toDataURL('image/png');
  a.download='clean-diagram.png';
  a.click();
});

window.addEventListener('resize',()=>{
  if(img)fitCanvas();
});
</script>

</body>
</html>
