<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>COLAS Diagram Cleaner</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f6;font-family:Arial,sans-serif;overflow-x:hidden}
.header{background:#004b87;color:#fff;padding:12px 14px;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:999}
.wrap{padding:10px;max-width:1100px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.canvasWrap{width:100%;overflow:hidden}
canvas{background:#fff;border:2px solid #ccd3df;border-radius:10px;display:block;width:100%;height:auto}
.controls{display:grid;grid-template-columns:repeat(2,minmax(140px,1fr));gap:10px}
button,input{min-height:46px;font-size:16px}
button{border:none;background:#004b87;color:#fff;padding:10px 14px;border-radius:10px;font-weight:bold}
button.secondary{background:#344054}
.status{font-weight:bold;color:#004b87}
.sliderRow{margin:12px 0}
.sliderRow label{display:flex;justify-content:space-between;font-weight:700;margin-bottom:5px}
input[type=range]{width:100%}
.help{background:#fff7d6;border:1px solid #c99a00;border-radius:10px;padding:10px;font-weight:700}
.previewBox{position:relative}
</style>
</head>
<body>
<div class="header">COLAS Diagram Cleaner <span style="color:#ffe600;font-size:14px;">v85 slider crop</span></div>

<div class="wrap">
  <div class="card">
    <input type="file" id="fileInput" accept="image/*">
    <p class="status" id="status">Upload a site diagram photo.</p>
    <div class="help">No pinch zoom needed. Use the sliders/buttons below. The blue box shows exactly what will be cleaned.</div>
  </div>

  <div class="card">
    <h2>Quick Crop</h2>
    <div class="controls">
      <button type="button" onclick="preset('full')">Use Full Image</button>
      <button type="button" onclick="preset('paper')">Auto Paper Area</button>
      <button type="button" onclick="preset('top')">Top Half</button>
      <button type="button" onclick="preset('middle')">Middle</button>
      <button type="button" onclick="preset('bottom')">Bottom Half</button>
      <button type="button" class="secondary" onclick="cleanDiagram()">Clean Diagram</button>
    </div>
  </div>

  <div class="card">
    <h2>Fine Crop Sliders</h2>
    <div class="sliderRow"><label>Left <span id="leftVal">8%</span></label><input id="left" type="range" min="0" max="95" value="8"></div>
    <div class="sliderRow"><label>Right <span id="rightVal">92%</span></label><input id="right" type="range" min="5" max="100" value="92"></div>
    <div class="sliderRow"><label>Top <span id="topVal">18%</span></label><input id="top" type="range" min="0" max="95" value="18"></div>
    <div class="sliderRow"><label>Bottom <span id="bottomVal">86%</span></label><input id="bottom" type="range" min="5" max="100" value="86"></div>
  </div>

  <div class="card">
    <h2>Preview</h2>
    <div class="canvasWrap"><canvas id="preview"></canvas></div>
  </div>

  <div class="card">
    <h2>Clean Result</h2>
    <div class="controls">
      <button type="button" onclick="cleanDiagram()">Clean Diagram</button>
      <button type="button" onclick="downloadPng()">Download PNG</button>
    </div>
    <br>
    <div class="canvasWrap"><canvas id="result"></canvas></div>
  </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const preview=document.getElementById('preview');
const result=document.getElementById('result');
const pctx=preview.getContext('2d');
const rctx=result.getContext('2d');
const statusEl=document.getElementById('status');

const L=document.getElementById('left');
const R=document.getElementById('right');
const T=document.getElementById('top');
const B=document.getElementById('bottom');

let img=null;
let displayScale=1;

function status(t){statusEl.textContent=t;}

function vals(){
  let l=Number(L.value), r=Number(R.value), t=Number(T.value), b=Number(B.value);
  if(r <= l+3){ r=l+3; R.value=r; }
  if(b <= t+3){ b=t+3; B.value=b; }
  document.getElementById('leftVal').textContent=l+'%';
  document.getElementById('rightVal').textContent=r+'%';
  document.getElementById('topVal').textContent=t+'%';
  document.getElementById('bottomVal').textContent=b+'%';
  return {l,r,t,b};
}

function fitPreview(){
  if(!img)return;
  const maxW=Math.min(window.innerWidth-24,1050);
  displayScale=maxW/img.width;
  preview.width=Math.max(320,Math.round(img.width*displayScale));
  preview.height=Math.round(img.height*displayScale);
  drawPreview();
}

function drawPreview(){
  if(!img)return;
  const v=vals();
  pctx.clearRect(0,0,preview.width,preview.height);
  pctx.drawImage(img,0,0,preview.width,preview.height);

  const x=preview.width*(v.l/100);
  const y=preview.height*(v.t/100);
  const w=preview.width*((v.r-v.l)/100);
  const h=preview.height*((v.b-v.t)/100);

  pctx.fillStyle='rgba(0,123,255,0.08)';
  pctx.fillRect(x,y,w,h);
  pctx.strokeStyle='#007bff';
  pctx.lineWidth=5;
  pctx.strokeRect(x,y,w,h);

  pctx.fillStyle='rgba(0,0,0,0.35)';
  pctx.fillRect(0,0,preview.width,y);
  pctx.fillRect(0,y,x,h);
  pctx.fillRect(x+w,y,preview.width-(x+w),h);
  pctx.fillRect(0,y+h,preview.width,preview.height-(y+h));
}

[L,R,T,B].forEach(el=>el.addEventListener('input',drawPreview));

function preset(type){
  if(type==='full'){L.value=0;R.value=100;T.value=0;B.value=100;}
  if(type==='paper'){L.value=5;R.value=95;T.value=8;B.value=94;}
  if(type==='top'){L.value=5;R.value=95;T.value=0;B.value=52;}
  if(type==='middle'){L.value=5;R.value=95;T.value=25;B.value=75;}
  if(type==='bottom'){L.value=5;R.value=95;T.value=48;B.value=100;}
  drawPreview();
}

fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    img=new Image();
    img.onload=()=>{
      preset('paper');
      fitPreview();
      status('Pick a quick crop or adjust sliders, then press Clean Diagram.');
    };
    img.onerror=()=>status('Image failed to load. Try JPG/PNG.');
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

function cleanDiagram(){
  if(!img){status('Upload an image first.');return;}
  const v=vals();

  const sx=Math.round(img.width*(v.l/100));
  const sy=Math.round(img.height*(v.t/100));
  const sw=Math.round(img.width*((v.r-v.l)/100));
  const sh=Math.round(img.height*((v.b-v.t)/100));

  result.width=sw;
  result.height=sh;
  rctx.clearRect(0,0,sw,sh);
  rctx.drawImage(img,sx,sy,sw,sh,0,0,sw,sh);

  const imgData=rctx.getImageData(0,0,sw,sh);
  const d=imgData.data;

  for(let i=0;i<d.length;i+=4){
    const r=d[i], g=d[i+1], b=d[i+2];
    const avg=(r+g+b)/3;
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    const sat=max-min;
    const ink=(avg<190 || (avg<225 && sat>20)) ? 0 : 255;
    d[i]=ink; d[i+1]=ink; d[i+2]=ink; d[i+3]=255;
  }

  rctx.putImageData(imgData,0,0);
  status('Diagram cleaned. Download PNG.');
}

function downloadPng(){
  if(!result.width){status('Clean diagram first.');return;}
  const a=document.createElement('a');
  a.href=result.toDataURL('image/png');
  a.download='clean-diagram.png';
  a.click();
}

window.addEventListener('resize',()=>{ if(img) fitPreview(); });
</script>
</body>
</html>
