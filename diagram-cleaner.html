<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>COLAS Diagram Cleaner</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f6;font-family:Arial,sans-serif;overflow-x:hidden}
.header{background:#004b87;color:#fff;padding:12px 14px;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:999}
.wrap{padding:10px;max-width:1100px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.canvasWrap{width:100%;overflow:auto;-webkit-overflow-scrolling:touch}
canvas{background:#fff;border:2px solid #ccd3df;border-radius:10px;touch-action:none;display:block}
#preview{width:100%;height:auto}
#result{width:100%;height:auto;min-height:260px}
.controls{display:flex;gap:10px;flex-wrap:wrap}
button,input{min-height:48px;font-size:16px}
button{border:none;background:#004b87;color:#fff;padding:12px 18px;border-radius:10px;font-weight:bold}
.status{font-weight:bold;color:#004b87}
</style>
</head>
<body>
<div class="header">COLAS Diagram Cleaner <span style="color:#ffe600;font-size:14px;">v83</span></div>
<div class="wrap">
  <div class="card">
    <input type="file" id="fileInput" accept="image/*">
    <p class="status" id="status">Upload a site diagram photo.</p>
  </div>
  <div class="card">
    <h2>Crop Drawing Area</h2>
    <p>Drag inside the box to move. Drag blue corner squares to resize.</p>
    <div class="canvasWrap"><canvas id="preview"></canvas></div>
  </div>
  
<div class="card" id="easyCropCard">
<h2>Quick Crop Tools</h2>
<div class="controls">
<button type="button" onclick="presetCrop('full')">Use Full Image</button>
<button type="button" onclick="presetCrop('top')">Top Half</button>
<button type="button" onclick="presetCrop('middle')">Middle</button>
<button type="button" onclick="presetCrop('bottom')">Bottom Half</button>
<button type="button" onclick="resizeCrop(1.1)">Bigger</button>
<button type="button" onclick="resizeCrop(0.9)">Smaller</button>
<button type="button" onclick="moveCrop(0,-40)">Up</button>
<button type="button" onclick="moveCrop(0,40)">Down</button>
<button type="button" onclick="moveCrop(-40,0)">Left</button>
<button type="button" onclick="moveCrop(40,0)">Right</button>
</div>
</div>

<div class="card">
    <div class="controls">
      <button id="cleanBtn">Clean Diagram</button>
      <button id="downloadBtn">Download PNG</button>
    </div>
  </div>
  <div class="card">
    <h2>Clean Result</h2>
    <div class="canvasWrap"><canvas id="result"></canvas></div>
  </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const preview=document.getElementById('preview');
const result=document.getElementById('result');
const pctx=preview.getContext('2d');
const rctx=result.getContext('2d');
const statusEl=document.getElementById('status');

let img=null;
let crop={x:80,y:80,w:300,h:420};
let dragging=false;
let mode='move';
let start={x:0,y:0};
let startCrop={};
const HANDLE=38;

function status(t){statusEl.textContent=t;}

function fitCanvas(){
  if(!img)return;
  const maxW=Math.min(window.innerWidth-24,1100);
  const scale=maxW/img.width;
  preview.width=Math.max(320,Math.round(img.width*scale));
  preview.height=Math.round(img.height*(preview.width/img.width));
  crop={
    x:preview.width*0.08,
    y:preview.height*0.18,
    w:preview.width*0.84,
    h:preview.height*0.68
  };
  draw();
}

function draw(){
  if(!img)return;
  pctx.clearRect(0,0,preview.width,preview.height);
  pctx.drawImage(img,0,0,preview.width,preview.height);
  pctx.strokeStyle='#007bff';
  pctx.lineWidth=5;
  pctx.strokeRect(crop.x,crop.y,crop.w,crop.h);
  [[crop.x,crop.y],[crop.x+crop.w,crop.y],[crop.x,crop.y+crop.h],[crop.x+crop.w,crop.y+crop.h]].forEach(p=>{
    pctx.fillStyle='#007bff';
    pctx.fillRect(p[0]-HANDLE/2,p[1]-HANDLE/2,HANDLE,HANDLE);
  });
}

function pos(e){
  const r=preview.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*(preview.width/r.width), y:(t.clientY-r.top)*(preview.height/r.height)};
}
function near(px,py,x,y){return Math.abs(px-x)<56 && Math.abs(py-y)<56;}

function down(e){
  if(!img)return;
  if(e.cancelable)e.preventDefault();
  const p=pos(e);
  start=p;
  startCrop={...crop};
  if(near(p.x,p.y,crop.x,crop.y)) mode='nw';
  else if(near(p.x,p.y,crop.x+crop.w,crop.y)) mode='ne';
  else if(near(p.x,p.y,crop.x,crop.y+crop.h)) mode='sw';
  else if(near(p.x,p.y,crop.x+crop.w,crop.y+crop.h)) mode='se';
  else mode='move';
  dragging=true;
}
function move(e){
  if(!dragging)return;
  if(e.cancelable)e.preventDefault();
  const p=pos(e);
  const dx=p.x-start.x, dy=p.y-start.y;
  crop={...startCrop};
  if(mode==='move'){crop.x+=dx;crop.y+=dy;}
  if(mode.includes('e')) crop.w+=dx;
  if(mode.includes('s')) crop.h+=dy;
  if(mode.includes('w')){crop.x+=dx;crop.w-=dx;}
  if(mode.includes('n')){crop.y+=dy;crop.h-=dy;}
  crop.w=Math.max(100,crop.w); crop.h=Math.max(100,crop.h);
  crop.x=Math.max(0,Math.min(preview.width-crop.w,crop.x));
  crop.y=Math.max(0,Math.min(preview.height-crop.h,crop.y));
  draw();
}
function up(e){if(e&&e.cancelable)e.preventDefault();dragging=false;}

preview.addEventListener('pointerdown',down,{passive:false});
window.addEventListener('pointermove',move,{passive:false});
window.addEventListener('pointerup',up,{passive:false});
preview.addEventListener('touchstart',down,{passive:false});
window.addEventListener('touchmove',move,{passive:false});
window.addEventListener('touchend',up,{passive:false});

fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    img=new Image();
    img.onload=()=>{fitCanvas();status('Resize crop box and press Clean Diagram.');};
    img.onerror=()=>status('Image failed to load. Try JPG/PNG.');
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('cleanBtn').addEventListener('click',()=>{
  if(!img){status('Upload an image first.');return;}
  const sx=crop.x*(img.width/preview.width);
  const sy=crop.y*(img.height/preview.height);
  const sw=crop.w*(img.width/preview.width);
  const sh=crop.h*(img.height/preview.height);
  result.width=Math.round(sw);
  result.height=Math.round(sh);
  rctx.clearRect(0,0,result.width,result.height);
  rctx.drawImage(img,sx,sy,sw,sh,0,0,result.width,result.height);
  const imgData=rctx.getImageData(0,0,result.width,result.height);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    const avg=(d[i]+d[i+1]+d[i+2])/3;
    const val=avg>185?255:0;
    d[i]=val; d[i+1]=val; d[i+2]=val; d[i+3]=255;
  }
  rctx.putImageData(imgData,0,0);
  status('Diagram cleaned. Download PNG.');
});

document.getElementById('downloadBtn').addEventListener('click',()=>{
  if(!result.width){status('Clean diagram first.');return;}
  const a=document.createElement('a');
  a.href=result.toDataURL('image/png');
  a.download='clean-diagram.png';
  a.click();
});

window.addEventListener('resize',()=>{ if(img) draw(); });
</script>

<script id="v83EasyCrop">
function clampCrop(){
  crop.w=Math.max(100,Math.min(preview.width,crop.w));
  crop.h=Math.max(100,Math.min(preview.height,crop.h));
  crop.x=Math.max(0,Math.min(preview.width-crop.w,crop.x));
  crop.y=Math.max(0,Math.min(preview.height-crop.h,crop.y));
}

function presetCrop(type){
  if(!img) return;

  if(type==='full'){
    crop={x:10,y:10,w:preview.width-20,h:preview.height-20};
  }

  if(type==='top'){
    crop={x:20,y:20,w:preview.width-40,h:(preview.height*0.45)};
  }

  if(type==='middle'){
    crop={
      x:20,
      y:(preview.height*0.25),
      w:preview.width-40,
      h:(preview.height*0.45)
    };
  }

  if(type==='bottom'){
    crop={
      x:20,
      y:(preview.height*0.50),
      w:preview.width-40,
      h:(preview.height*0.45)
    };
  }

  clampCrop();
  draw();
}

function resizeCrop(scale){
  if(!img) return;

  const cx=crop.x+(crop.w/2);
  const cy=crop.y+(crop.h/2);

  crop.w*=scale;
  crop.h*=scale;

  crop.x=cx-(crop.w/2);
  crop.y=cy-(crop.h/2);

  clampCrop();
  draw();
}

function moveCrop(dx,dy){
  if(!img) return;

  crop.x+=dx;
  crop.y+=dy;

  clampCrop();
  draw();
}
</script>

</body>
</html>
